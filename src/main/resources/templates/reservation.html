<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <title>Reservierung erfassen</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">Radiologie Institut</div>
    <div class="nav-links">
        <a th:href="@{/}">Übersicht</a>
        <a th:href="@{/patienten/neu}">Patient registrieren</a>
        <a th:href="@{/reservierungen/neu}">Reservierung erfassen</a>
        <a th:href="@{/reservierungen/liste}">Reservierungsliste</a>
    </div>
</nav>
<main class="container">
    <h1>Reservierung erfassen</h1>

    <div th:if="${erfolgsmeldung}" class="alert alert-success" th:text="${erfolgsmeldung}"></div>
    <div th:if="${fehler}" class="alert alert-error" th:text="${fehler}"></div>

    <form action="/reservierungen/neu" method="post" class="form-card">
        <div class="form-row">
            <div class="form-group">
                <label for="patientId">Patient *</label>
                <select id="patientId" name="patientId" class="form-control" required>
                    <option value="">-- Patient auswählen --</option>
                    <option th:each="p : ${patienten}"
                            th:value="${p.id}"
                            th:text="${p.vollerName} + ' (SVN: ' + ${p.svnummer} + ')'">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label for="deviceBezeichnung">Gerät *</label>
                <select id="deviceBezeichnung" name="deviceBezeichnung"
                        class="form-control" required>
                    <option value="">-- Gerät auswählen --</option>
                    <option th:each="d : ${devices}"
                            th:value="${d.bezeichnung}"
                            th:text="${d.bezeichnung} + ' (' + ${d.type} + ', Raum ' + ${d.raumnummer} + ')'">
                    </option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="untersuchungszeitStr">Untersuchungszeitpunkt *</label>
                <input type="datetime-local" id="untersuchungszeitStr"
                       name="untersuchungszeitStr" class="form-control" required/>
            </div>
            <div class="form-group">
                <label for="koerperregion">Körperregion *</label>
                <select id="koerperregion" name="koerperregion" class="form-control" required>
                    <option value="">-- Region auswählen --</option>
                    <option th:each="kr : ${koerperregionen}"
                            th:value="${kr}"
                            th:text="${kr}">
                    </option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="kommentar">Kommentar</label>
            <textarea id="kommentar" name="kommentar" rows="3"
                      class="form-control" placeholder="Optionale Anmerkungen..."></textarea>
        </div>
        <button type="submit" class="btn-primary">Reservierung speichern</button>
    </form>
</main>
</body>
</html>
