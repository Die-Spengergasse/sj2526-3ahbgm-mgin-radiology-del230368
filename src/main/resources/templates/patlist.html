<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patients</title>

    <style>
        body { font-family: Arial; margin: 20px; }

        table {
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid black;
            padding: 5px;
        }

        a {
            background-color: cornflowerblue;
            padding: 5px;
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>

<h2>Patient List</h2>

<table>
    <tr>
        <th>Insurance</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Birth Date</th>
    </tr>

    <tr th:each="p : ${patients}">
        <td th:text="${p.insuranceNumber}"></td>
        <td th:text="${p.firstName}"></td>
        <td th:text="${p.surname}"></td>
        <td th:text="${p.birth}"></td>
    </tr>
</table>

<br>
<a href="/patient/add">Add Patient</a>
<a href="/">Back</a>


</body>
</html>
